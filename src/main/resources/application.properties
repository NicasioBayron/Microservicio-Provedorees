spring.application.name=provedorees
# 1. Configuración del Servidor
server.port=8086


# 2. Configuración de la Base de Datos (Asegúrate de crear 'productos_db' en MySQL)
spring.datasource.url=jdbc:mysql://db-provedorees:3306/db_provedorees?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# 3. Configuración de JPA / Hibernate
# Importante: ddl-auto=none porque Liquibase se encargará de las tablas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#para que reconosca los nombres de la base de datos con camelCase o no
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl



# 4. Configuración de Liquibase
spring.liquibase.enabled=true
# Ruta al archivo maestro que crearemos a continuación
spring.liquibase.change-log=classpath:/db/changelog/db.provedorees.sql
# Si quieres que borre y recree todo cada vez (solo para pruebas), usa 'true' en drop-first
spring.liquibase.drop-first=true
logging.level.com.proveedores.provedorees=DEBUG
logging.file.name=logs/microservicio-provedorees.log

#configuración Swagger
springdoc.swagger-ui.enabled=true
#Url del Swagger
springdoc.swagger-ui.path=/doc/swagger-ui.html